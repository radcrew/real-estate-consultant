# Coverage report posted as a PR comment on every pull request.
# Each package runs its own test suite with coverage enabled; a final job
# aggregates the results into a single Markdown table on the PR conversation.
#
# All three packages run their own test suite and upload a coverage artifact.
name: Coverage Report

on:
  pull_request:

permissions:
  pull-requests: write

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run coverage
        run: pnpm --filter radestate test:coverage
        env:
          NEXT_PUBLIC_BACKEND_API_URL: https://ci-placeholder.example.com
          NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/coverage-summary.json

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -U pip && python -m pip install -e ".[dev]"

      - name: Run coverage
        run: pytest --cov=app --cov-report=json -q
        env:
          DATABASE_URL: postgresql+asyncpg://ci:ci@localhost/ci
          SUPABASE_URL: https://ci-placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key

      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.json

  ingestion:
    name: Ingestion
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ingestion
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -U pip && python -m pip install -e ".[dev]"

      - name: Run coverage
        run: pytest --cov=app --cov-report=json -q

      - uses: actions/upload-artifact@v4
        with:
          name: ingestion-coverage
          path: services/ingestion/coverage.json

  comment:
    name: Post comment
    needs: [frontend, backend, ingestion]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/frontend

      - uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: coverage/backend

      - uses: actions/download-artifact@v4
        with:
          name: ingestion-coverage
          path: coverage/ingestion

      - name: Build and post comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            function fmt(val) {
              return val == null ? 'N/A' : `${val.toFixed(1)}%`;
            }

            function badge(val) {
              if (val == null) return '⬜';
              if (val >= 80) return '🟢';
              if (val >= 60) return '🟡';
              return '🔴';
            }

            let frontendPct = null;
            try {
              const fe = JSON.parse(fs.readFileSync('coverage/frontend/coverage-summary.json', 'utf8'));
              frontendPct = fe.total.lines.pct;
            } catch (e) {
              core.warning(`Could not read frontend coverage: ${e.message}`);
            }

            let backendPct = null;
            try {
              const be = JSON.parse(fs.readFileSync('coverage/backend/coverage.json', 'utf8'));
              backendPct = be.totals.percent_covered;
            } catch (e) {
              core.warning(`Could not read backend coverage: ${e.message}`);
            }

            let ingestionPct = null;
            try {
              const ing = JSON.parse(fs.readFileSync('coverage/ingestion/coverage.json', 'utf8'));
              ingestionPct = ing.totals.percent_covered;
            } catch (e) {
              core.warning(`Could not read ingestion coverage: ${e.message}`);
            }

            const rows = [
              ['Frontend', frontendPct],
              ['Backend', backendPct],
              ['Ingestion', ingestionPct],
            ];

            const table = [
              '| Package | Lines | |',
              '|---------|------:|:-:|',
              ...rows.map(([name, val]) => `| ${name} | ${fmt(val)} | ${badge(val)} |`),
            ].join('\n');

            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const body = [
              '## Coverage Report',
              '',
              table,
              '',
              `> 🟢 ≥80% &nbsp;·&nbsp; 🟡 60–79% &nbsp;·&nbsp; 🔴 <60% &nbsp;·&nbsp; ⬜ no tests yet`,
              `> Updated for ${sha}`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith('## Coverage Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
