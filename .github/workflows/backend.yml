# FastAPI backend: lint on PR/push; preview deploy on PR; production deploy on push to main.
#
# Separate Vercel project with Root Directory = backend (Settings → General).
# Deploy runs from backend/ (repo-root .vercelignore excludes backend for the frontend project).
#
# GitHub secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_BACKEND_PROJECT_ID,
#                 VERCEL_AUTOMATION_BYPASS_SECRET (Vercel → Settings → Deployment Protection)
# Production env in Vercel: see backend/.env.example
name: Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -U pip && python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check app

  deploy:
    name: Deploy to Vercel
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          url=$(vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Smoke test
        env:
          BASE_URL: ${{ steps.deploy.outputs.url }}
          BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          smoke() {
            local path="$1"
            for i in 1 2 3; do
              status=$(curl -s -o /dev/null -w "%{http_code}" \
                -H "x-vercel-protection-bypass: $BYPASS_SECRET" \
                "$BASE_URL$path")
              [ "$status" = "200" ] && { echo "OK $path"; return 0; }
              [ $i -lt 3 ] && sleep 5
            done
            echo "FAIL $path — last status $status" && exit 1
          }
          smoke /health/ready
          smoke /api/v1/ping

  deploy-preview:
    name: Deploy preview to Vercel
    needs: lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview to Vercel
        id: deploy
        run: |
          url=$(vercel deploy --yes --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Smoke test
        env:
          BASE_URL: ${{ steps.deploy.outputs.url }}
          BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          smoke() {
            local path="$1"
            for i in 1 2 3; do
              status=$(curl -s -o /dev/null -w "%{http_code}" \
                -H "x-vercel-protection-bypass: $BYPASS_SECRET" \
                "$BASE_URL$path")
              [ "$status" = "200" ] && { echo "OK $path"; return 0; }
              [ $i -lt 3 ] && sleep 5
            done
            echo "FAIL $path — last status $status" && exit 1
          }
          smoke /health/ready
          smoke /api/v1/ping

      - name: Preview URL
        run: echo "### Preview deployment\n${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
