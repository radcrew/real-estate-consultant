name: Feature request
description: Suggest an idea or enhancement for the project
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow or pain point this addresses (intake, ingestion, ranking, outreach, etc.).
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend (Next.js)
        - Backend (FastAPI)
        - Ingestion / connectors
        - Supabase / data
        - Deployment / CI
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
    validations:
      required: false
